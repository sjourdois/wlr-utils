[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Linux/wlroots only).
targets = ["x86_64-unknown-linux-gnu"]

# System libraries needed to build on the CI runners (EGL/GL are loaded at
# runtime via dlopen, so they are not build dependencies).
[dist.dependencies.apt]
libwayland-dev = '*'
libxkbcommon-dev = '*'
libfontconfig-dev = '*'
# Build dep for the default `gpu` feature (dma-buf via gbm); libgbm itself ships
# with Mesa at runtime and is picked up as an auto runtime dependency.
libgbm-dev = '*'
# wlr-shot `video` (FFmpeg) — links the system libav* at build time.
clang = '*'
libavcodec-dev = '*'
libavformat-dev = '*'
libavutil-dev = '*'
libavfilter-dev = '*'
libavdevice-dev = '*'
libswscale-dev = '*'
libswresample-dev = '*'
libva-dev = '*'
# wlr-shot `audio` — native PipeWire capture.
libpipewire-0.3-dev = '*'
# wlr-peek `ocr` — Tesseract/Leptonica.
libtesseract-dev = '*'
libleptonica-dev = '*'
# wlr-draw `tray` — StatusNotifierItem over D-Bus.
libdbus-1-dev = '*'
