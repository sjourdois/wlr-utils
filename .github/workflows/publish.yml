name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch: {} # allow manual re-publish of the current Cargo.toml version

jobs:
  crates-io:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev libfontconfig-dev libgbm-dev \
            clang libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev libva-dev \
            libpipewire-0.3-dev libtesseract-dev libleptonica-dev libdbus-1-dev
      - name: Publish to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          # Publish in dependency order: the shared lib first, then the binaries
          # (which depend on it). A version already on crates.io is skipped.
          # Logs go outside the repo so cargo doesn't see a dirty working tree.
          for pkg in wlr-capture wlr-chooser wlr-pip wlr-shot wlr-peek wlr-draw; do
            log="$RUNNER_TEMP/publish-$pkg.log"
            if cargo publish -p "$pkg" 2>"$log"; then
              echo "$pkg published"
            elif grep -qi 'already' "$log"; then
              echo "$pkg: this version is already on crates.io — skipping"
              cat "$log"
            else
              cat "$log" >&2
              exit 1
            fi
            # Give the index a moment to update so dependents resolve the new lib.
            sleep 15
          done
