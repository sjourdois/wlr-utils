name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch: {} # allow manual re-publish of the current Cargo.toml version

jobs:
  crates-io:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev libfontconfig-dev libgbm-dev
      - name: Publish to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          # Log outside the repo so cargo publish doesn't see a dirty working tree.
          log="$RUNNER_TEMP/publish-err.log"
          if cargo publish 2>"$log"; then
            echo "published"
          elif grep -qi 'already' "$log"; then
            echo "this version is already on crates.io — skipping"
            cat "$log"
          else
            cat "$log" >&2
            exit 1
          fi
